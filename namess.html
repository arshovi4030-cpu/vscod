<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        height: 100vh;
        margin: 0;
       background: linear-gradient(to bottom, #667eea, #8660ab, #5a3eae);
       color:white;
       display: flex;
       justify-content: center;
       align-items: center;
       font-family: sans-serif;
    }
    h1{
        display: flex;
        gap: 5px;
        font-size: 5rem;
    }
   
    h1 samp{
        display: inline-block;
        animation: ripple 1.2s ease-in-out infinite;
    }
        h1 samp:nth-child(1){animation-delay:0s;}
        h1 samp:nth-child(2){animation-delay:01s;}
        h1 samp:nth-child(3){animation-delay:02s;}
        h1 samp:nth-child(4){animation-delay:03s;}
        h1 samp:nth-child(5){animation-delay:04s;}
    
        @keyframes ripple{
            0%,100%{
                transform: translateY(0)scale(1);color: white;}
                
            50%{
                transform: translateY(-15px)scale(6);color: #00f7ff;}
                

        }

</style>
<body>
    <h1>
        <samp>N</samp>
         <samp>E</samp>
         <samp>G</samp>
         <samp>A</samp>
         <samp>R</samp>
          <samp>R</samp>
          

        
    </h1>
    
</body>
</html>
