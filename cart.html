<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>سبد خرید محسن سلطان جنگل</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(to bottom, #667eea, #8660ab, #5a3eae);
      font-family: sans-serif;
    }
    h1 {
      font-size: 28px;
      font-style: italic;
      color: #fff;
      text-align: center;
      margin-top: 40px;
    }
    .card {
      margin-bottom: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <h1>سبد خرید شما</h1>

  <div class="container my-4">
    <div class="row" id="cartRoot"></div>
    <div class="text-center mt-4">
      <h4 id="totalPrice" class="text-light"></h4>
      <a href="index.html" class="btn btn-light mt-3">بازگشت به فروشگاه</a>
    </div>
  </div>

  <script>
    const PRODUCTS_LIST = [
      { id: 1, title: 'پاور بانک مک دودو مدل MC-502', price: 199000, image: "https://dkstatics-public.digikala.com/digikala-products/11cc57ff4f58fac442bd727dcd857cf0f2d1e166_1754253163.jpg" },
      { id: 2, title: 'پاوربانک کانفلون مدل A47Q', price: 499000, image: "https://dkstatics-public.digikala.com/digikala-products/06824056d9ba715438ec3c6a604af30fe40ceda2_1743417953.jpg" },
      { id: 3, title: 'پاوربانک مدل WICCoo___22.5W', price: 1190000, image: "https://dkstatics-public.digikala.com/digikala-products/614878a2b87b42e71a46623719a96f8818cc1bc9_1757314887.jpg" },
      { id: 4, title: 'پاوربانک گرین مدل چند کاره', price: 2590000, image: "https://dkstatics-public.digikala.com/digikala-products/4a8758767ccade1d854dc5bb5fe3337cd6000138_1733301197.jpg" }
    ];

    const cartRoot = document.getElementById("cartRoot");
    const totalPriceEl = document.getElementById("totalPrice");
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function renderCart() {
      cartRoot.innerHTML = "";
      let total = 0;

      cart.forEach((productId, index) => {
        const product = PRODUCTS_LIST.find(p => p.id === productId);
        if (!product) return;

        total += product.price;

        const col = document.createElement("div");
        col.className = "col-12 col-sm-6 col-md-4 col-lg-3";

        const card = document.createElement("div");
        card.className = "card h-100 text-center";

        const img = document.createElement("img");
        img.className = "card-img-top";
        img.src = product.image;
        img.alt = product.title;

        const cardBody = document.createElement("div");
        cardBody.className = "card-body";

        const h5 = document.createElement("h5");
        h5.className = "card-title";
        h5.innerText = product.title;

        const price = document.createElement("p");











        price.className = "text-info fw-bold";
        price.innerText = product.price.toLocaleString() + " تومان";




    const removeBtn = document.createElement("button");
    removeBtn.className = "btn btn-danger w-100";
    removeBtn.innerText = "حذف از سبد";
    removeBtn.onclick = () => {
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      renderCart();
    };

    cardBody.appendChild(h5);
    cardBody.appendChild(price);
    cardBody.appendChild(removeBtn);
    card.appendChild(img);
    card.appendChild(cardBody);
    col.appendChild(card);
    cartRoot.appendChild(col);
  });

  totalPriceEl.innerText = "مجموع قیمت: " + total.toLocaleString() + " تومان";
}

renderCart();



  </script>
</body>
</html>
