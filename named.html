<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Ripple Text</title>
  <style>
    body {
      min-height: 100vh; 
      margin: 0;
      background: linear-gradient(to bottom, #667eea, #8660ab, #5a3eae);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
      box-sizing: border-box; 
    }

    h1 {
      display: inline-block;
      animation: ripple 1.2s ease-in-out infinite;
      font-size: clamp(2rem, 8vw, 3rem); 
      margin: 0;
      line-height: 1.2; 
    }

    h1 samp {
      display: inline-block; 
      margin: 0 2px; 
    }

    h1 samp:nth-child(1) { animation-delay: 0s; }
    h1 samp:nth-child(2) { animation-delay: 0.1s; }
    h1 samp:nth-child(3) { animation-delay: 0.2s; }
    h1 samp:nth-child(4) { animation-delay: 0.3s; }
    h1 samp:nth-child(5) { animation-delay: 0.4s; }

    @keyframes ripple {
      0%, 100% {
        transform: translateY(0) scale(1);
        color: white;
      }
      50% {
        transform: translateY(-15px) scale(6);
        color: #00f7ff;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px; 
      }
      h1 samp {
        margin: 0 1px; 
      }
      @keyframes ripple {
        50% {
          transform: translateY(-10px) scale(4); 
        }
      }
    }

    @media (min-width: 768px) {
      h1 {
        font-size: 4rem; 
      }
    }
  </style>
</head>
<body>
  <h1>
    <samp>N</samp>
    <samp>E</samp>
    <samp>G</samp>
    <samp>A</samp>
    <samp>R</samp>
  </h1>
</body>
</html>
